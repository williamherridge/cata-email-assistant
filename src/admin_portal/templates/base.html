<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}League Assistant{% endblock %}</title>
    <style>
      :root {
        --bg: #f4efe4;
        --panel: #fffdf8;
        --ink: #1f2a2b;
        --muted: #607070;
        --line: #d9cfbf;
        --accent: #0f766e;
        --accent-strong: #115e59;
        --warn: #92400e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, 0.12), transparent 28rem),
          linear-gradient(180deg, #f7f3ea 0%, var(--bg) 100%);
        color: var(--ink);
      }

      a {
        color: var(--accent-strong);
      }

      .shell {
        width: min(2400px, calc(100% - 0.5rem));
        margin: 0 auto;
        padding: 0.45rem 0 1rem;
      }

      .hero {
        display: flex;
        justify-content: space-between;
        gap: 0.75rem;
        align-items: center;
        margin-bottom: 0.35rem;
      }

      .hero-brand {
        display: flex;
        align-items: center;
        gap: 0.55rem;
        min-width: 0;
      }

      .hero-nav {
        display: flex;
        gap: 0.35rem;
        align-items: center;
        flex-wrap: wrap;
      }

      .hero-nav a {
        text-decoration: none;
      }

      .hero-link {
        border-color: transparent;
        background: transparent;
        color: var(--muted);
      }

      .hero-link.active {
        background: var(--accent);
        border-color: var(--accent);
        color: white;
      }

      .hero h1 {
        margin: 0;
        font-size: clamp(1.35rem, 1.9vw, 1.85rem);
        line-height: 1;
      }

      .hero-tools {
        display: flex;
        align-items: center;
        justify-content: end;
        gap: 0.35rem;
        flex-wrap: wrap;
        min-width: 0;
      }

      .grid {
        display: grid;
        gap: 1rem;
      }

      .grid.two {
        grid-template-columns: 320px minmax(0, 1fr);
      }

      .panel {
        background: color-mix(in srgb, var(--panel) 96%, white 4%);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 0.95rem;
        box-shadow: 0 12px 40px rgba(49, 43, 30, 0.06);
      }

      .panel h2,
      .panel h3 {
        margin: 0 0 0.75rem;
      }

      .compact-panel {
        padding: 0.68rem 0.82rem;
        border-radius: 16px;
      }

      .section-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 0.75rem;
      }

      .compact-header {
        gap: 0.55rem;
        margin-bottom: 0.45rem;
      }

      .section-header h3 {
        margin-bottom: 0;
      }

      .stack {
        display: grid;
        gap: 0.9rem;
      }

      .compact-form-grid {
        gap: 0.55rem 0.75rem;
      }

      .inline-label-grid {
        display: grid;
        gap: 0.45rem 0.75rem;
        grid-template-columns: 4.2rem minmax(0, 1fr) 2.8rem minmax(0, 1fr);
        align-items: center;
      }

      .inline-label-grid .full-span {
        grid-column: 1 / -1;
      }

      .inline-field {
        display: contents;
      }

      .inline-field-label {
        font-size: 0.88rem;
        font-weight: 700;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }

      .inline-label-grid .subject-label {
        grid-column: 1;
      }

      .inline-label-grid .subject-input {
        grid-column: 2 / -1;
      }

      .workbench-header-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(18rem, 28rem);
        gap: 0.6rem 0.9rem;
        align-items: start;
        width: 100%;
      }

      .workbench-subject-editor {
        display: grid;
        gap: 0.2rem;
        align-self: center;
      }

      .workbench-subject-editor label {
        gap: 0.2rem;
      }

      .subject-link {
        color: inherit;
        text-decoration: none;
      }

      .subject-link:hover {
        color: var(--accent-strong);
        text-decoration: underline;
      }

      .inline-select-grid {
        display: grid;
        gap: 0.45rem 0.65rem;
        grid-template-columns: auto minmax(0, 1.2fr) minmax(0, 1.2fr) minmax(7.2rem, 0.55fr) minmax(7.2rem, 0.55fr) auto;
      }

      .review-select-grid {
        align-items: end;
      }

      .review-save-slot {
        display: flex;
        justify-content: end;
        align-items: end;
      }

      .compact-meta-line {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
        align-items: center;
        font-size: 0.95rem;
        line-height: 1.2;
      }

      .toolbar-actions {
        display: flex;
        align-items: center;
        justify-content: end;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .poll-summary {
        display: flex;
        align-items: center;
        justify-content: end;
        gap: 0.35rem;
        flex-wrap: wrap;
        text-align: right;
        font-size: 0.9rem;
      }

      .workbench-layout {
        display: grid;
        grid-template-columns: minmax(520px, 640px) minmax(0, 1fr);
        gap: 0.8rem;
        align-items: start;
      }

      .workbench-stack {
        gap: 0.45rem;
      }

      .queue-panel {
        padding: 0.55rem 0;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        max-height: calc(100vh - 8.75rem);
      }

      .queue-filter-form {
        margin-bottom: 0.45rem;
      }

      .queue-filter-grid {
        grid-template-columns: minmax(0, 1.5fr) minmax(0, 1fr) minmax(0, 1fr) minmax(0, 0.5fr) minmax(0, 0.5fr) auto;
        align-items: end;
        gap: 0.55rem 0.65rem;
      }

      .queue-column-head {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1.35fr) 5rem 3rem;
        gap: 0.75rem;
        padding: 0 1.15rem 0.45rem;
        border-bottom: 1px solid var(--line);
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }

      .queue-column-head .right {
        text-align: right;
      }

      .queue-list {
        display: grid;
      }

      .queue-scroll-region {
        overflow-y: auto;
        scrollbar-gutter: stable;
        min-height: 0;
        flex: 1 1 auto;
        outline: none;
      }

      .queue-scroll-region:focus {
        box-shadow: inset 0 0 0 2px rgba(15, 118, 110, 0.18);
      }

      .queue-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1.35fr) 5rem 3rem;
        gap: 0.75rem;
        align-items: start;
        padding: 0.56rem 1.15rem;
        color: inherit;
        text-decoration: none;
        border-left: 4px solid transparent;
        border-bottom: 1px solid var(--line);
      }

      .queue-row:hover {
        background: rgba(15, 118, 110, 0.04);
      }

      .queue-row.selected {
        background: rgba(15, 118, 110, 0.08);
        border-left-color: var(--accent);
      }

      .queue-row.loading {
        opacity: 0.65;
      }

      .queue-from,
      .queue-subject {
        display: -webkit-box;
        overflow: hidden;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
        line-height: 1.25;
      }

      .queue-from {
        font-weight: 400;
      }

      .queue-subject {
        font-weight: 400;
      }

      .queue-date {
        text-align: right;
        white-space: nowrap;
      }

      .queue-meta {
        min-height: 1.5rem;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 0.2rem;
      }

      .history-layout {
        display: grid;
        grid-template-columns: minmax(380px, 520px) minmax(0, 1fr);
        gap: 1rem;
        align-items: start;
      }

      .history-list {
        display: grid;
      }

      .history-row {
        display: grid;
        gap: 0.35rem;
        padding: 0.9rem 1.15rem;
        color: inherit;
        text-decoration: none;
        border-left: 4px solid transparent;
        border-bottom: 1px solid var(--line);
      }

      .history-row:hover {
        background: rgba(15, 118, 110, 0.04);
      }

      .history-row.selected {
        background: rgba(15, 118, 110, 0.08);
        border-left-color: var(--accent);
      }

      .history-row-top {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 0.75rem;
      }

      .history-row-from {
        font-weight: 700;
      }

      .history-row-date {
        color: var(--muted);
        white-space: nowrap;
        text-align: right;
      }

      .history-row-subject {
        font-weight: 700;
      }

      .history-tabs {
        display: flex;
        gap: 0.6rem;
        flex-wrap: wrap;
        margin-bottom: 1rem;
      }

      .tab-link {
        display: inline-flex;
        align-items: center;
        padding: 0.65rem 1rem;
        border: 1px solid var(--line);
        border-radius: 999px;
        text-decoration: none;
        color: var(--ink);
        background: rgba(255, 255, 255, 0.45);
      }

      .tab-link.active {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
      }

      .meta-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 1.2rem;
        min-height: 1.2rem;
        font-size: 0.95rem;
        font-weight: 700;
      }

      .meta-reply {
        color: #1d4ed8;
      }

      .meta-info {
        color: #0f766e;
      }

      .meta-critical {
        color: #b91c1c;
      }

      .meta-high {
        color: #1d4ed8;
      }

      .meta-low {
        color: #475569;
      }

      .meta-attachment {
        color: #475569;
      }

      .meta-history {
        color: #0f766e;
      }

      .busy-note {
        margin-top: 0.5rem;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .form-grid {
        display: grid;
        gap: 0.9rem;
      }

      .form-grid.two-up {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .span-two {
        grid-column: 1 / -1;
      }

      .link-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.32rem 0.62rem;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.75);
        text-decoration: none;
        white-space: nowrap;
      }

      .editor-toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem;
      }

      .editor-button {
        padding: 0.45rem 0.7rem;
        border-radius: 12px;
        background: #d8e7e4;
        color: var(--accent-strong);
      }

      .draft-surface {
        min-height: 140px;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 0.5rem 0.66rem;
        background: white;
        line-height: 1.2;
      }

      .draft-surface:focus {
        outline: 2px solid rgba(15, 118, 110, 0.2);
        outline-offset: 2px;
      }

      .draft-surface p,
      .draft-surface div,
      .draft-surface ul,
      .draft-surface ol {
        margin: 0 0 0.22rem;
      }

      .draft-surface > :last-child {
        margin-bottom: 0;
      }

      .message-body-preview {
        white-space: pre-wrap;
        line-height: 1.55;
      }

      .message-body-preview.html-body-preview {
        white-space: normal;
        line-height: 1.4;
      }

      .rendered-email-body {
        white-space: normal;
        line-height: 1.4;
        overflow-wrap: anywhere;
      }

      .rendered-email-body > :first-child {
        margin-top: 0;
      }

      .rendered-email-body > :last-child {
        margin-bottom: 0;
      }

      .rendered-email-body p,
      .rendered-email-body div,
      .rendered-email-body blockquote,
      .rendered-email-body pre,
      .rendered-email-body ul,
      .rendered-email-body ol,
      .rendered-email-body table {
        margin: 0 0 0.22rem;
      }

      .rendered-email-body table {
        width: 100%;
        border-collapse: collapse;
      }

      .rendered-email-body td,
      .rendered-email-body th {
        padding: 0.45rem 0.55rem;
        border: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }

      .rendered-email-body a {
        color: var(--accent-strong);
      }

      .empty-workbench {
        min-height: 18rem;
        display: grid;
        align-content: center;
      }

      .workbench-loading {
        opacity: 0.65;
        pointer-events: none;
      }

      .mailbox-card + .mailbox-card,
      .poll-run + .poll-run {
        margin-top: 0.8rem;
        padding-top: 0.8rem;
        border-top: 1px solid var(--line);
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 0.34rem 0.68rem;
        background: var(--accent);
        color: white;
        font: inherit;
        cursor: pointer;
        white-space: nowrap;
      }

      button:hover {
        background: var(--accent-strong);
      }

      button[disabled] {
        opacity: 0.7;
        cursor: wait;
      }

      .button-row {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      .compact-button-row {
        gap: 0.35rem;
        align-items: center;
      }

      .workbench-action-row {
        display: grid;
        grid-template-columns: auto auto 1fr auto 1fr auto;
        gap: 0.45rem;
        align-items: center;
      }

      .workbench-action-row .action-send {
        grid-column: 1;
      }

      .workbench-action-row .action-save-draft {
        grid-column: 2;
      }

      .workbench-action-row .action-regenerate {
        grid-column: 4;
        justify-self: center;
      }

      .workbench-action-row .action-ignore {
        grid-column: 6;
        justify-self: end;
      }

      .inline-checkbox-action-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      .draft-action-row {
        display: grid;
        grid-template-columns: auto auto 1fr auto;
        gap: 0.35rem;
        align-items: center;
        margin-bottom: 0.25rem;
      }

      .draft-action-row .action-send {
        grid-column: 1;
      }

      .draft-action-row .action-save-draft {
        grid-column: 2;
      }

      .draft-action-row .action-regenerate {
        grid-column: 4;
        justify-self: end;
      }

      .button-secondary {
        background: #d8e7e4;
        color: var(--accent-strong);
      }

      .button-warn {
        background: #a4511f;
      }

      .busy-note {
        margin-top: 0.6rem;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .notice {
        margin-bottom: 0.7rem;
        padding: 0.55rem 0.8rem;
        border-radius: 14px;
        border: 1px solid rgba(15, 118, 110, 0.2);
        background: rgba(15, 118, 110, 0.08);
        color: var(--accent-strong);
      }

      .mobile-only {
        display: none;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 0.8rem 0.45rem;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }

      th {
        font-size: 0.85rem;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .pill {
        display: inline-block;
        padding: 0.2rem 0.55rem;
        border-radius: 999px;
        background: rgba(15, 118, 110, 0.1);
        color: var(--accent-strong);
        font-size: 0.82rem;
      }

      .muted {
        color: var(--muted);
      }

      .body-card {
        white-space: pre-wrap;
        line-height: 1.55;
      }

      .kv {
        display: grid;
        grid-template-columns: 180px minmax(0, 1fr);
        gap: 0.5rem 1rem;
      }

      label {
        display: grid;
        gap: 0.25rem;
        font-weight: 600;
        font-size: 0.9rem;
      }

      input[type="text"],
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 0.48rem 0.66rem;
        background: white;
        color: var(--ink);
        font: inherit;
      }

      .contact-autocomplete-shell {
        position: relative;
      }

      .contact-suggestion-list {
        position: absolute;
        top: calc(100% + 0.2rem);
        left: 0;
        right: 0;
        z-index: 30;
        display: grid;
        gap: 0;
        padding: 0.28rem;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: color-mix(in srgb, var(--panel) 94%, white 6%);
        box-shadow: 0 12px 32px rgba(49, 43, 30, 0.16);
      }

      .contact-suggestion-list[hidden] {
        display: none;
      }

      .contact-suggestion-item {
        border: 0;
        border-radius: 10px;
        padding: 0.42rem 0.55rem;
        background: transparent;
        color: var(--ink);
        text-align: left;
        cursor: pointer;
      }

      .contact-suggestion-item:hover,
      .contact-suggestion-item.active {
        background: rgba(15, 118, 110, 0.1);
        color: var(--accent-strong);
      }

      .contact-suggestion-primary {
        font-weight: 600;
        line-height: 1.2;
      }

      .contact-suggestion-secondary {
        font-size: 0.84rem;
        color: var(--muted);
        line-height: 1.2;
      }

      .signature-placeholder {
        margin-top: 0.45rem;
        padding: 0.3rem 0;
        font-style: italic;
        color: var(--muted);
        cursor: pointer;
      }

      .signature-placeholder:focus {
        outline: 2px solid rgba(15, 118, 110, 0.2);
        outline-offset: 2px;
        border-radius: 8px;
      }

      .signature-placeholder a {
        color: var(--muted);
        text-decoration: underline;
      }

      .signature-modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 60;
        display: grid;
        place-items: center;
        padding: 1rem;
        background: rgba(31, 42, 43, 0.28);
      }

      .signature-modal-backdrop[hidden] {
        display: none;
      }

      .signature-modal {
        width: min(42rem, 100%);
        max-height: min(80vh, 44rem);
        overflow: auto;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 20px;
        box-shadow: 0 18px 48px rgba(49, 43, 30, 0.22);
        padding: 1rem;
      }

      .signature-modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        margin-bottom: 0.8rem;
      }

      .signature-modal-header h3 {
        margin: 0;
      }

      .signature-preview-body {
        background: white;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 0.9rem;
      }

      .checkbox-row {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        font-weight: 600;
        font-size: 0.95rem;
      }

      .checkbox-row input {
        width: 1rem;
        height: 1rem;
      }

      @media (max-width: 900px) {
        .shell {
          width: min(100%, calc(100% - 0.5rem));
          padding-top: 0.5rem;
        }

        .grid.two {
          grid-template-columns: 1fr;
        }

        .hero,
        .hero-brand,
        .hero-tools {
          display: grid;
        }

        .workbench-layout,
        .toolbar-actions {
          display: grid;
        }

        .workbench-stack {
          display: none;
        }

        .mobile-only {
          display: block;
        }

        .poll-summary {
          justify-items: start;
          text-align: left;
        }

        .queue-filter-grid,
        .inline-label-grid,
        .inline-select-grid,
        .workbench-header-row {
          grid-template-columns: 1fr;
        }

        .review-save-slot {
          justify-content: start;
        }

        .workbench-action-row {
          grid-template-columns: 1fr;
        }

        .workbench-action-row .action-send,
        .workbench-action-row .action-save-draft,
        .workbench-action-row .action-regenerate,
        .workbench-action-row .action-ignore {
          grid-column: auto;
          justify-self: start;
        }

        .inline-checkbox-action-row {
          align-items: start;
          justify-content: start;
        }

        .draft-action-row {
          grid-template-columns: 1fr;
        }

        .draft-action-row .action-send,
        .draft-action-row .action-save-draft,
        .draft-action-row .action-regenerate {
          grid-column: auto;
          justify-self: start;
        }

        .inline-field {
          display: grid;
          gap: 0.25rem;
        }

        .inline-label-grid .subject-label,
        .inline-label-grid .subject-input,
        .inline-label-grid .full-span {
          grid-column: auto;
        }

        .inline-field-label {
          text-transform: none;
          letter-spacing: normal;
        }

        .kv {
          grid-template-columns: 1fr;
        }

        .queue-column-head,
        .queue-row,
        .form-grid.two-up {
          grid-template-columns: 1fr;
        }

        .queue-column-head {
          display: none;
        }

        .queue-row {
          gap: 0.35rem;
        }
        .queue-date {
          text-align: left;
        }

        .queue-meta {
          min-height: auto;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="hero-brand">
          <h1>League Assistant</h1>
          <nav class="hero-nav" aria-label="Primary">
            <a
              href="/queue"
              class="link-button hero-link {% if request.url.path == '/queue' or request.url.path == '/' or request.url.path.startswith('/messages/') %}active{% endif %}"
            >Queue</a>
            <a
              href="/history"
              class="link-button hero-link {% if request.url.path.startswith('/history') %}active{% endif %}"
            >History</a>
          </nav>
        </div>
        <div class="hero-tools">
          {% block hero_tools %}{% endblock %}
        </div>
      </section>
      {% block content %}{% endblock %}
    </main>
    <div class="signature-modal-backdrop" data-signature-modal-backdrop hidden>
      <div class="signature-modal">
        <div class="signature-modal-header">
          <h3>Signature Preview</h3>
          <button type="button" class="button-secondary" data-signature-modal-close>Close</button>
        </div>
        <div class="signature-preview-body rendered-email-body" data-signature-modal-body>
          <p class="muted" style="margin: 0;">Loading signature preview...</p>
        </div>
      </div>
    </div>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        let skipDraftGuard = false;

        const draftForms = () => Array.from(document.querySelectorAll("[data-draft-form]"));

        const hasDirtyDraft = () =>
          draftForms().some((form) => form.dataset.draftDirty === "1");

        const confirmDiscardDraftChanges = () => {
          if (skipDraftGuard || !hasDirtyDraft()) {
            return true;
          }
          return window.confirm("You have unsaved draft changes. Leave this message and discard them?");
        };

        const clearDraftDirtyState = () => {
          draftForms().forEach((form) => {
            form.dataset.draftDirty = "0";
          });
        };

        const initializePollForms = (root = document) => {
          root.querySelectorAll("[data-poll-form]").forEach((form) => {
            if (form.dataset.boundPollForm === "1") return;
            form.dataset.boundPollForm = "1";
            form.addEventListener("submit", () => {
              const button = form.querySelector("button[type='submit']");
              if (!button) return;

              button.disabled = true;
              button.dataset.originalLabel = button.textContent;
              button.textContent = "Polling...";

              const note = document.createElement("div");
              note.className = "busy-note";
              note.textContent = "Polling Gmail and refreshing the queue...";
              form.appendChild(note);
            });
          });
        };

        const initializeEditorToolbar = (root = document) => {
          root.querySelectorAll("[data-editor-command]").forEach((button) => {
            if (button.dataset.boundEditorCommand === "1") return;
            button.dataset.boundEditorCommand = "1";
            button.addEventListener("click", () => {
              const command = button.dataset.editorCommand;
              if (!command) return;
              document.execCommand(command, false);
            });
          });
        };

        const initializeDraftForms = (root = document) => {
          root.querySelectorAll("[data-draft-form]").forEach((form) => {
            if (form.dataset.boundDraftForm === "1") return;
            form.dataset.boundDraftForm = "1";

            const workbench = form.closest("[data-queue-workbench]") || document;
            const editor = workbench.querySelector("[data-draft-editor]");
            const signaturePlaceholderLabel = form.dataset.signaturePlaceholderLabel || "Email signature populated here";
            const sendButton = workbench.querySelector("[data-send-button]");
            const saveDraftButton = workbench.querySelector("[data-save-draft-button]");
            const trackedInputs = Array.from(
              form.querySelectorAll("input[name='draft_to'], input[name='draft_cc'], input[name='draft_subject']")
            );

            const extractMeaningfulDraftText = (draftHtml) => {
              const parser = new DOMParser();
              const doc = parser.parseFromString(draftHtml || "", "text/html");
              const body = doc.body;
              if (!body) return "";

              body.querySelectorAll("a, p, div, span, em").forEach((element) => {
                const text = (element.textContent || "").replace(/\u00a0/g, " ").trim();
                if (!text) return;
                if (text === signaturePlaceholderLabel) {
                  element.remove();
                  return;
                }
                if (/^hi\s+.+,\s*$/i.test(text)) {
                  element.remove();
                }
              });

              return (body.textContent || "").replace(/\u00a0/g, " ").replace(/\s+/g, " ").trim().replace(/^[,\s]+|[,\s]+$/g, "");
            };

            const updateDraftActionState = () => {
              const meaningfulDraftText = extractMeaningfulDraftText(editor?.innerHTML || "");
              const blankReply = meaningfulDraftText.length === 0;
              if (sendButton) {
                sendButton.disabled = blankReply;
              }
              if (saveDraftButton) {
                saveDraftButton.disabled = blankReply;
              }
            };

            const snapshotDraft = () => JSON.stringify({
              draft_to: form.querySelector("input[name='draft_to']")?.value || "",
              draft_cc: form.querySelector("input[name='draft_cc']")?.value || "",
              draft_subject: form.querySelector("input[name='draft_subject']")?.value || "",
              draft_html: editor?.innerHTML.trim() || "",
            });

            const evaluateDraftDirty = () => {
              const baseline = form.dataset.draftBaseline || "";
              const dirty = snapshotDraft() !== baseline;
              form.dataset.draftDirty = dirty ? "1" : "0";
              if (dirty) {
                skipDraftGuard = false;
              }
            };

            form.dataset.draftBaseline = snapshotDraft();
            form.dataset.draftDirty = "0";
            updateDraftActionState();

            trackedInputs.forEach((input) => {
              input.addEventListener("input", evaluateDraftDirty);
            });
            if (editor) {
              editor.addEventListener("input", () => {
                evaluateDraftDirty();
                updateDraftActionState();
              });
            }

            form.addEventListener("submit", (event) => {
              const draftInput = form.querySelector("[data-draft-input]");
              if (editor && draftInput) {
                draftInput.value = editor.innerHTML.trim();
              }

              skipDraftGuard = true;
              clearDraftDirtyState();

              const submitter = event.submitter;
              if (submitter && submitter.hasAttribute("data-send-button")) {
                submitter.disabled = true;
                submitter.dataset.originalLabel = submitter.textContent;
                submitter.textContent = "Sending...";

                let note = form.querySelector(".busy-note");
                if (!note) {
                  note = document.createElement("div");
                  note.className = "busy-note";
                  form.appendChild(note);
                }
                note.textContent = "Sending test email and refreshing the queue...";
              }
            });
          });
        };

        const initializeContactAutocomplete = (root = document) => {
          root.querySelectorAll("input[data-contact-autocomplete]").forEach((input) => {
            if (input.dataset.boundContactAutocomplete === "1") return;
            input.dataset.boundContactAutocomplete = "1";

            const shell = document.createElement("div");
            shell.className = "contact-autocomplete-shell";
            input.parentNode?.insertBefore(shell, input);
            shell.appendChild(input);

            const list = document.createElement("div");
            list.className = "contact-suggestion-list";
            list.hidden = true;
            shell.appendChild(list);

            let suggestions = [];
            let activeIndex = -1;
            let requestCounter = 0;

            const hideSuggestions = () => {
              suggestions = [];
              activeIndex = -1;
              list.hidden = true;
              list.replaceChildren();
            };

            const getTokenBounds = () => {
              const value = input.value || "";
              const cursor = input.selectionStart ?? value.length;
              const tokenStart = value.lastIndexOf(",", Math.max(cursor - 1, 0)) + 1;
              let tokenEnd = value.indexOf(",", cursor);
              if (tokenEnd < 0) tokenEnd = value.length;
              return { value, tokenStart, tokenEnd };
            };

            const getCurrentToken = () => {
              const { value, tokenStart, tokenEnd } = getTokenBounds();
              return value.slice(tokenStart, tokenEnd).trim();
            };

            const renderSuggestions = () => {
              list.replaceChildren();
              if (!suggestions.length) {
                hideSuggestions();
                return;
              }

              suggestions.forEach((suggestion, index) => {
                const button = document.createElement("button");
                button.type = "button";
                button.className = "contact-suggestion-item";
                if (index === activeIndex) {
                  button.classList.add("active");
                }

                const primary = document.createElement("div");
                primary.className = "contact-suggestion-primary";
                primary.textContent = suggestion.display_name || suggestion.email;
                button.appendChild(primary);

                if (suggestion.display_name) {
                  const secondary = document.createElement("div");
                  secondary.className = "contact-suggestion-secondary";
                  secondary.textContent = suggestion.email;
                  button.appendChild(secondary);
                }

                button.addEventListener("mousedown", (event) => {
                  event.preventDefault();
                  applySuggestion(suggestion);
                });
                list.appendChild(button);
              });

              list.hidden = false;
            };

            const applySuggestion = (suggestion) => {
              const { value, tokenStart, tokenEnd } = getTokenBounds();
              let before = value.slice(0, tokenStart).replace(/\s*$/, "");
              const after = value.slice(tokenEnd);
              const insertValue = suggestion.insert_value || suggestion.label || suggestion.email;

              if (before && !before.endsWith(",")) {
                before += ",";
              }
              if (before) {
                before += " ";
              }

              input.value = `${before}${insertValue}${after}`;
              const cursor = (before + insertValue).length;
              input.setSelectionRange(cursor, cursor);
              input.dispatchEvent(new Event("input", { bubbles: true }));
              hideSuggestions();
              input.focus();
            };

            const loadSuggestions = async () => {
              const query = getCurrentToken();
              const currentRequest = ++requestCounter;
              try {
                const url = new URL("/api/known-contacts", window.location.origin);
                url.searchParams.set("q", query);
                url.searchParams.set("limit", "8");
                const response = await fetch(url.toString(), {
                  headers: {
                    "X-Requested-With": "fetch",
                  },
                });
                if (!response.ok) {
                  hideSuggestions();
                  return;
                }
                const payload = await response.json();
                if (currentRequest !== requestCounter) return;
                suggestions = Array.isArray(payload.contacts) ? payload.contacts : [];
                activeIndex = suggestions.length ? 0 : -1;
                renderSuggestions();
              } catch (_error) {
                hideSuggestions();
              }
            };

            input.addEventListener("input", () => {
              loadSuggestions();
            });

            input.addEventListener("focus", () => {
              loadSuggestions();
            });

            input.addEventListener("keydown", (event) => {
              if (!suggestions.length) return;
              if (event.key === "ArrowDown") {
                event.preventDefault();
                activeIndex = (activeIndex + 1) % suggestions.length;
                renderSuggestions();
                return;
              }
              if (event.key === "ArrowUp") {
                event.preventDefault();
                activeIndex = (activeIndex - 1 + suggestions.length) % suggestions.length;
                renderSuggestions();
                return;
              }
              if (event.key === "Enter") {
                event.preventDefault();
                if (activeIndex >= 0 && activeIndex < suggestions.length) {
                  applySuggestion(suggestions[activeIndex]);
                }
                return;
              }
              if (event.key === "Escape") {
                event.preventDefault();
                hideSuggestions();
              }
            });

            input.addEventListener("blur", () => {
              window.setTimeout(hideSuggestions, 120);
            });

            shell.addEventListener("mouseenter", () => {
              if (suggestions.length && activeIndex < 0) {
                activeIndex = 0;
                renderSuggestions();
              }
            });
          });
        };

        const initializeSignaturePreview = () => {
          if (document.body.dataset.boundSignaturePreview === "1") return;
          document.body.dataset.boundSignaturePreview = "1";

          const backdrop = document.querySelector("[data-signature-modal-backdrop]");
          const modalBody = document.querySelector("[data-signature-modal-body]");
          let cachedSignatureHtml = "";

          const closeModal = () => {
            if (backdrop) {
              backdrop.hidden = true;
            }
          };

          const findPreviewTrigger = (target) => {
            if (!(target instanceof Node)) return null;
            const element = target.nodeType === Node.ELEMENT_NODE ? target : target.parentElement;
            if (!(element instanceof Element)) return null;
            return element.closest('a[href^="https://signature-preview.local/"]');
          };

          const openModal = async () => {
            if (!backdrop || !modalBody) return;
            backdrop.hidden = false;
            if (cachedSignatureHtml) {
              modalBody.innerHTML = cachedSignatureHtml;
              return;
            }

            modalBody.innerHTML = '<p class="muted" style="margin: 0;">Loading signature preview...</p>';
            try {
              const response = await fetch("/api/signature-preview", {
                headers: {
                  "X-Requested-With": "fetch",
                },
              });
              if (!response.ok) {
                modalBody.innerHTML = '<p class="muted" style="margin: 0;">Signature preview is unavailable right now.</p>';
                return;
              }
              const payload = await response.json();
              cachedSignatureHtml = payload.html || "";
              modalBody.innerHTML = cachedSignatureHtml || '<p class="muted" style="margin: 0;">Signature preview is unavailable right now.</p>';
            } catch (_error) {
              modalBody.innerHTML = '<p class="muted" style="margin: 0;">Signature preview is unavailable right now.</p>';
            }
          };

          document.addEventListener("mousedown", (event) => {
            const previewTrigger = findPreviewTrigger(event.target);
            if (!previewTrigger) return;
            event.preventDefault();
          });

          document.addEventListener("click", (event) => {
            const previewTrigger = findPreviewTrigger(event.target);
            if (previewTrigger) {
              event.preventDefault();
              openModal();
              return;
            }

            const closeButton = event.target.closest("[data-signature-modal-close]");
            if (closeButton || event.target === backdrop) {
              event.preventDefault();
              closeModal();
            }
          });

          document.addEventListener("keydown", (event) => {
            const previewTrigger = findPreviewTrigger(event.target);
            if (
              previewTrigger &&
              (event.key === "Enter" || event.key === " ")
            ) {
              event.preventDefault();
              openModal();
              return;
            }
            if (event.key === "Escape" && backdrop && !backdrop.hidden) {
              closeModal();
            }
          });
        };

        const initializeQueueDesktopSelection = () => {
          const media = window.matchMedia("(max-width: 900px)");

          document.querySelectorAll("[data-desktop-href][data-mobile-href]").forEach((link) => {
            if (link.dataset.boundQueueSelection === "1") return;
            link.dataset.boundQueueSelection = "1";

            link.addEventListener("click", async (event) => {
              if (event.defaultPrevented) return;
              if (media.matches) return;
              if (event.metaKey || event.ctrlKey || event.shiftKey || event.altKey || event.button !== 0) return;
              if (!confirmDiscardDraftChanges()) {
                event.preventDefault();
                return;
              }

              const desktopHref = link.dataset.desktopHref;
              const workbench = document.querySelector("[data-queue-workbench]");
              if (!desktopHref || !workbench) return;

              event.preventDefault();

              const selectedMessageId = new URL(desktopHref, window.location.origin).searchParams.get("selected_message_id");
              document.querySelectorAll(".queue-row.selected").forEach((row) => row.classList.remove("selected"));
              document.querySelectorAll(".queue-row.loading").forEach((row) => row.classList.remove("loading"));
              link.classList.add("selected", "loading");
              workbench.classList.add("workbench-loading");

              try {
                const partialUrl = new URL("/queue/selection", window.location.origin);
                const fullUrl = new URL(desktopHref, window.location.origin);
                fullUrl.searchParams.forEach((value, key) => partialUrl.searchParams.set(key, value));

                const response = await fetch(partialUrl.toString(), {
                  headers: {
                    "X-Requested-With": "fetch",
                  },
                });
                if (!response.ok) {
                  window.location.href = desktopHref;
                  return;
                }

                const html = await response.text();
                workbench.outerHTML = html;
                window.history.pushState({ selectedMessageId }, "", desktopHref);
                initializeWorkbench(document);
              } catch (error) {
                window.location.href = desktopHref;
              } finally {
                link.classList.remove("loading");
                const currentWorkbench = document.querySelector("[data-queue-workbench]");
                if (currentWorkbench) {
                  currentWorkbench.classList.remove("workbench-loading");
                }
              }
            });
          });
        };

        const initializeHistoryDesktopSelection = () => {
          const media = window.matchMedia("(max-width: 900px)");

          document.querySelectorAll(".history-row[data-desktop-href][data-mobile-href]").forEach((link) => {
            if (link.dataset.boundHistorySelection === "1") return;
            link.dataset.boundHistorySelection = "1";

            link.addEventListener("click", async (event) => {
              if (event.defaultPrevented) return;
              if (media.matches) return;
              if (event.metaKey || event.ctrlKey || event.shiftKey || event.altKey || event.button !== 0) return;
              if (!confirmDiscardDraftChanges()) {
                event.preventDefault();
                return;
              }

              const desktopHref = link.dataset.desktopHref;
              const workbench = document.querySelector("[data-history-workbench]");
              if (!desktopHref || !workbench) return;

              event.preventDefault();

              document.querySelectorAll(".history-row.selected").forEach((row) => row.classList.remove("selected"));
              document.querySelectorAll(".history-row.loading").forEach((row) => row.classList.remove("loading"));
              link.classList.add("selected", "loading");
              workbench.classList.add("workbench-loading");

              try {
                const partialUrl = new URL("/history/selection", window.location.origin);
                const fullUrl = new URL(desktopHref, window.location.origin);
                fullUrl.searchParams.forEach((value, key) => partialUrl.searchParams.set(key, value));

                const response = await fetch(partialUrl.toString(), {
                  headers: {
                    "X-Requested-With": "fetch",
                  },
                });
                if (!response.ok) {
                  window.location.href = desktopHref;
                  return;
                }

                const html = await response.text();
                workbench.outerHTML = html;
                window.history.pushState({ selectedMessageId: fullUrl.searchParams.get("selected_message_id") }, "", desktopHref);
                initializeWorkbench(document);
              } catch (error) {
                window.location.href = desktopHref;
              } finally {
                link.classList.remove("loading");
                const currentWorkbench = document.querySelector("[data-history-workbench]");
                if (currentWorkbench) {
                  currentWorkbench.classList.remove("workbench-loading");
                }
              }
            });
          });
        };

        const loadQueueSelection = async (link, { updateFocus = false } = {}) => {
          const desktopHref = link?.dataset?.desktopHref;
          const workbench = document.querySelector("[data-queue-workbench]");
          if (!desktopHref || !workbench) {
            return;
          }

          const queueRegion = document.querySelector(".queue-scroll-region");
          const selectedMessageId = new URL(desktopHref, window.location.origin).searchParams.get("selected_message_id");
          document.querySelectorAll(".queue-row.selected").forEach((row) => {
            row.classList.remove("selected");
            row.setAttribute("aria-selected", "false");
          });
          document.querySelectorAll(".queue-row.loading").forEach((row) => row.classList.remove("loading"));
          link.classList.add("selected", "loading");
          link.setAttribute("aria-selected", "true");
          workbench.classList.add("workbench-loading");

          try {
            const partialUrl = new URL("/queue/selection", window.location.origin);
            const fullUrl = new URL(desktopHref, window.location.origin);
            fullUrl.searchParams.forEach((value, key) => partialUrl.searchParams.set(key, value));

            const response = await fetch(partialUrl.toString(), {
              headers: {
                "X-Requested-With": "fetch",
              },
            });
            if (!response.ok) {
              window.location.href = desktopHref;
              return;
            }

            const html = await response.text();
            workbench.outerHTML = html;
            window.history.pushState({ selectedMessageId }, "", desktopHref);
            initializeWorkbench(document);
            if (updateFocus && queueRegion) {
              queueRegion.focus();
              link.scrollIntoView({ block: "nearest" });
            }
          } catch (error) {
            window.location.href = desktopHref;
          } finally {
            link.classList.remove("loading");
            const currentWorkbench = document.querySelector("[data-queue-workbench]");
            if (currentWorkbench) {
              currentWorkbench.classList.remove("workbench-loading");
            }
          }
        };

        const initializeQueueKeyboardNavigation = () => {
          const media = window.matchMedia("(max-width: 900px)");
          document.querySelectorAll(".queue-scroll-region").forEach((region) => {
            if (region.dataset.boundQueueKeyboard === "1") return;
            region.dataset.boundQueueKeyboard = "1";

            region.addEventListener("keydown", async (event) => {
              if (media.matches) return;
              if (event.key !== "ArrowDown" && event.key !== "ArrowUp") return;

              const activeTag = document.activeElement?.tagName;
              if (activeTag === "INPUT" || activeTag === "SELECT" || activeTag === "TEXTAREA") {
                return;
              }

              const rows = Array.from(region.querySelectorAll(".queue-row"));
              if (!rows.length) return;

              const selectedIndex = rows.findIndex((row) => row.classList.contains("selected"));
              let nextIndex = selectedIndex;
              if (event.key === "ArrowDown") {
                nextIndex = selectedIndex < 0 ? 0 : Math.min(selectedIndex + 1, rows.length - 1);
              } else if (event.key === "ArrowUp") {
                nextIndex = selectedIndex < 0 ? 0 : Math.max(selectedIndex - 1, 0);
              }

              if (nextIndex === selectedIndex || nextIndex < 0) return;

              event.preventDefault();
              if (!confirmDiscardDraftChanges()) return;
              const nextRow = rows[nextIndex];
              nextRow.scrollIntoView({ block: "nearest" });
              await loadQueueSelection(nextRow, { updateFocus: true });
            });
          });
        };

        const initializeDraftNavigationGuard = () => {
          if (document.body.dataset.boundDraftGuard === "1") return;
          document.body.dataset.boundDraftGuard = "1";

          window.addEventListener("beforeunload", (event) => {
            if (skipDraftGuard || !hasDirtyDraft()) return;
            event.preventDefault();
            event.returnValue = "";
          });

          document.addEventListener("click", (event) => {
            const anchor = event.target.closest("a[href]");
            if (!anchor) return;
            if (anchor.matches('a[href^="https://signature-preview.local/"]')) {
              return;
            }
            if (event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) return;
            if (!confirmDiscardDraftChanges()) {
              event.preventDefault();
            }
          }, true);

          document.addEventListener("submit", (event) => {
            const form = event.target;
            if (!(form instanceof HTMLFormElement)) return;
            if (form.matches("[data-draft-form]")) return;
            if (!confirmDiscardDraftChanges()) {
              event.preventDefault();
              return;
            }
            skipDraftGuard = true;
          }, true);
        };

        const initializeRenderedEmailBodies = (root = document) => {
          root.querySelectorAll(".rendered-email-body").forEach((container) => {
            while (container.firstChild) {
              const node = container.firstChild;

              if (node.nodeType === Node.TEXT_NODE) {
                if ((node.textContent || "").replace(/\u00a0/g, " ").trim()) {
                  break;
                }
                container.removeChild(node);
                continue;
              }

              if (node.nodeType !== Node.ELEMENT_NODE) {
                container.removeChild(node);
                continue;
              }

              const element = node;
              const text = (element.textContent || "").replace(/\u00a0/g, " ").trim();
              const hasStructuredContent = Boolean(
                element.querySelector("img, table, hr, pre, code, blockquote, ul, ol, li")
              );
              if (text || hasStructuredContent) {
                break;
              }

              container.removeChild(element);
            }
          });
        };

        const initializeWorkbench = (root = document) => {
          initializeEditorToolbar(root);
          initializeDraftForms(root);
          initializeContactAutocomplete(root);
          initializeRenderedEmailBodies(root);
        };

        initializePollForms(document);
        initializeWorkbench(document);
        initializeQueueDesktopSelection();
        initializeHistoryDesktopSelection();
        initializeQueueKeyboardNavigation();
        initializeDraftNavigationGuard();
        initializeSignaturePreview();

        const updateQueueLinksForViewport = () => {
          const mobile = window.matchMedia("(max-width: 900px)").matches;
          document.querySelectorAll("[data-desktop-href][data-mobile-href]").forEach((link) => {
            link.setAttribute("href", mobile ? link.dataset.mobileHref : link.dataset.desktopHref);
          });
        };

        updateQueueLinksForViewport();
        const queueRegionToFocus = document.querySelector(".queue-scroll-region[data-focus-queue='1']");
        if (queueRegionToFocus) {
          queueRegionToFocus.focus();
        }
        window.addEventListener("resize", updateQueueLinksForViewport);
        window.addEventListener("popstate", () => {
          if (window.matchMedia("(max-width: 900px)").matches) return;
          window.location.reload();
        });
      });
    </script>
  </body>
</html>
