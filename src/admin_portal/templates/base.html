<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}CATA Email Assistant{% endblock %}</title>
    <style>
      :root {
        --bg: #f4efe4;
        --panel: #fffdf8;
        --ink: #1f2a2b;
        --muted: #607070;
        --line: #d9cfbf;
        --accent: #0f766e;
        --accent-strong: #115e59;
        --warn: #92400e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, 0.12), transparent 28rem),
          linear-gradient(180deg, #f7f3ea 0%, var(--bg) 100%);
        color: var(--ink);
      }

      a {
        color: var(--accent-strong);
      }

      .shell {
        width: min(1680px, calc(100% - 1rem));
        margin: 0 auto;
        padding: 1rem 0 2rem;
      }

      .hero {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        align-items: end;
        margin-bottom: 1.5rem;
      }

      .hero-nav {
        display: flex;
        gap: 0.75rem;
        align-items: center;
        flex-wrap: wrap;
      }

      .hero-nav a {
        text-decoration: none;
      }

      .hero h1 {
        margin: 0;
        font-size: clamp(2rem, 3vw, 3.25rem);
        line-height: 0.95;
      }

      .hero p {
        margin: 0.5rem 0 0;
        color: var(--muted);
        max-width: 42rem;
      }

      .grid {
        display: grid;
        gap: 1rem;
      }

      .grid.two {
        grid-template-columns: 320px minmax(0, 1fr);
      }

      .panel {
        background: color-mix(in srgb, var(--panel) 96%, white 4%);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 1.15rem;
        box-shadow: 0 12px 40px rgba(49, 43, 30, 0.06);
      }

      .panel h2,
      .panel h3 {
        margin: 0 0 0.75rem;
      }

      .section-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 0.75rem;
      }

      .section-header h3 {
        margin-bottom: 0;
      }

      .stack {
        display: grid;
        gap: 0.9rem;
      }

      .queue-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: start;
        gap: 1rem;
      }

      .toolbar-actions {
        display: flex;
        align-items: start;
        justify-content: end;
        gap: 1rem;
        flex-wrap: wrap;
      }

      .poll-summary {
        display: grid;
        justify-items: end;
        gap: 0.2rem;
        text-align: right;
      }

      .workbench-layout {
        display: grid;
        grid-template-columns: minmax(520px, 640px) minmax(0, 1fr);
        gap: 1rem;
        align-items: start;
      }

      .workbench-stack {
        gap: 1rem;
      }

      .queue-panel {
        padding: 0.75rem 0;
        overflow: hidden;
      }

      .queue-column-head {
        display: grid;
        grid-template-columns: 1.1rem minmax(0, 1fr) minmax(0, 1.35fr) 5rem 3rem;
        gap: 0.75rem;
        padding: 0 1.15rem 0.7rem;
        border-bottom: 1px solid var(--line);
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }

      .queue-column-head .right {
        text-align: right;
      }

      .queue-list {
        display: grid;
      }

      .queue-row {
        display: grid;
        grid-template-columns: 1.1rem minmax(0, 1fr) minmax(0, 1.35fr) 5rem 3rem;
        gap: 0.75rem;
        align-items: start;
        padding: 0.9rem 1.15rem;
        color: inherit;
        text-decoration: none;
        border-left: 4px solid transparent;
        border-bottom: 1px solid var(--line);
      }

      .queue-row:hover {
        background: rgba(15, 118, 110, 0.04);
      }

      .queue-row.selected {
        background: rgba(15, 118, 110, 0.08);
        border-left-color: var(--accent);
      }

      .queue-dot {
        width: 0.65rem;
        height: 0.65rem;
        margin-top: 0.4rem;
        border-radius: 999px;
        background: #3b82f6;
      }

      .queue-from,
      .queue-subject {
        display: -webkit-box;
        overflow: hidden;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
        line-height: 1.25;
      }

      .queue-from {
        font-weight: 700;
      }

      .queue-subject {
        font-weight: 700;
      }

      .queue-date {
        text-align: right;
        white-space: nowrap;
      }

      .queue-meta {
        min-height: 1.5rem;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 0.2rem;
      }

      .history-layout {
        display: grid;
        grid-template-columns: minmax(380px, 520px) minmax(0, 1fr);
        gap: 1rem;
        align-items: start;
      }

      .history-list {
        display: grid;
      }

      .history-row {
        display: grid;
        gap: 0.35rem;
        padding: 0.9rem 1.15rem;
        color: inherit;
        text-decoration: none;
        border-left: 4px solid transparent;
        border-bottom: 1px solid var(--line);
      }

      .history-row:hover {
        background: rgba(15, 118, 110, 0.04);
      }

      .history-row.selected {
        background: rgba(15, 118, 110, 0.08);
        border-left-color: var(--accent);
      }

      .history-row-top {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 0.75rem;
      }

      .history-row-from {
        font-weight: 700;
      }

      .history-row-date {
        color: var(--muted);
        white-space: nowrap;
        text-align: right;
      }

      .history-row-subject {
        font-weight: 700;
      }

      .history-tabs {
        display: flex;
        gap: 0.6rem;
        flex-wrap: wrap;
        margin-bottom: 1rem;
      }

      .tab-link {
        display: inline-flex;
        align-items: center;
        padding: 0.65rem 1rem;
        border: 1px solid var(--line);
        border-radius: 999px;
        text-decoration: none;
        color: var(--ink);
        background: rgba(255, 255, 255, 0.45);
      }

      .tab-link.active {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
      }

      .meta-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 1.2rem;
        min-height: 1.2rem;
        font-size: 0.95rem;
        font-weight: 700;
      }

      .meta-reply {
        color: #1d4ed8;
      }

      .meta-info {
        color: #0f766e;
      }

      .meta-critical {
        color: #b91c1c;
      }

      .meta-low {
        color: #475569;
      }

      .meta-attachment {
        color: #475569;
      }

      .meta-history {
        color: #0f766e;
      }

      .busy-note {
        margin-top: 0.5rem;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .form-grid {
        display: grid;
        gap: 0.9rem;
      }

      .form-grid.two-up {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .span-two {
        grid-column: 1 / -1;
      }

      .link-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.65rem 0.95rem;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.75);
        text-decoration: none;
      }

      .editor-toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem;
      }

      .editor-button {
        padding: 0.45rem 0.7rem;
        border-radius: 12px;
        background: #d8e7e4;
        color: var(--accent-strong);
      }

      .draft-surface {
        min-height: 320px;
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 1rem;
        background: white;
        line-height: 1.55;
      }

      .draft-surface:focus {
        outline: 2px solid rgba(15, 118, 110, 0.2);
        outline-offset: 2px;
      }

      .message-body-preview {
        white-space: pre-wrap;
        line-height: 1.55;
      }

      .rendered-email-body {
        white-space: normal;
        line-height: 1.55;
        overflow-wrap: anywhere;
      }

      .rendered-email-body > :first-child {
        margin-top: 0;
      }

      .rendered-email-body > :last-child {
        margin-bottom: 0;
      }

      .rendered-email-body p,
      .rendered-email-body div,
      .rendered-email-body blockquote,
      .rendered-email-body pre,
      .rendered-email-body ul,
      .rendered-email-body ol,
      .rendered-email-body table {
        margin: 0 0 0.9rem;
      }

      .rendered-email-body table {
        width: 100%;
        border-collapse: collapse;
      }

      .rendered-email-body td,
      .rendered-email-body th {
        padding: 0.45rem 0.55rem;
        border: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }

      .rendered-email-body a {
        color: var(--accent-strong);
      }

      .empty-workbench {
        min-height: 18rem;
        display: grid;
        align-content: center;
      }

      .mailbox-card + .mailbox-card,
      .poll-run + .poll-run {
        margin-top: 0.8rem;
        padding-top: 0.8rem;
        border-top: 1px solid var(--line);
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 0.7rem 1rem;
        background: var(--accent);
        color: white;
        font: inherit;
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-strong);
      }

      button[disabled] {
        opacity: 0.7;
        cursor: wait;
      }

      .button-row {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      .button-secondary {
        background: #d8e7e4;
        color: var(--accent-strong);
      }

      .button-warn {
        background: #a4511f;
      }

      .busy-note {
        margin-top: 0.6rem;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .notice {
        margin-bottom: 1rem;
        padding: 0.85rem 1rem;
        border-radius: 14px;
        border: 1px solid rgba(15, 118, 110, 0.2);
        background: rgba(15, 118, 110, 0.08);
        color: var(--accent-strong);
      }

      .mobile-only {
        display: none;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 0.8rem 0.45rem;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }

      th {
        font-size: 0.85rem;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .pill {
        display: inline-block;
        padding: 0.2rem 0.55rem;
        border-radius: 999px;
        background: rgba(15, 118, 110, 0.1);
        color: var(--accent-strong);
        font-size: 0.82rem;
      }

      .muted {
        color: var(--muted);
      }

      .body-card {
        white-space: pre-wrap;
        line-height: 1.55;
      }

      .kv {
        display: grid;
        grid-template-columns: 180px minmax(0, 1fr);
        gap: 0.5rem 1rem;
      }

      label {
        display: grid;
        gap: 0.35rem;
        font-weight: 600;
      }

      input[type="text"],
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 0.7rem 0.8rem;
        background: white;
        color: var(--ink);
        font: inherit;
      }

      .checkbox-row {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        font-weight: 600;
      }

      .checkbox-row input {
        width: 1rem;
        height: 1rem;
      }

      @media (max-width: 900px) {
        .shell {
          width: min(100%, calc(100% - 0.5rem));
          padding-top: 0.5rem;
        }

        .grid.two {
          grid-template-columns: 1fr;
        }

        .hero {
          display: block;
        }

        .workbench-layout,
        .queue-toolbar,
        .toolbar-actions {
          display: grid;
        }

        .workbench-stack {
          display: none;
        }

        .mobile-only {
          display: block;
        }

        .poll-summary {
          justify-items: start;
          text-align: left;
        }

        .kv {
          grid-template-columns: 1fr;
        }

        .queue-column-head,
        .queue-row,
        .form-grid.two-up {
          grid-template-columns: 1fr;
        }

        .queue-column-head {
          display: none;
        }

        .queue-row {
          gap: 0.35rem;
        }

        .queue-dot {
          display: none;
        }

        .queue-date {
          text-align: left;
        }

        .queue-meta {
          min-height: auto;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <h1>CATA Email Assistant</h1>
          <p>Lean pilot portal for Gmail ingest, active queue review, and early administrator workflow controls.</p>
        </div>
        <nav class="hero-nav" aria-label="Primary">
          <a href="/queue" class="link-button">Queue</a>
          <a href="/history" class="link-button">History</a>
        </nav>
      </section>
      {% block content %}{% endblock %}
    </main>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        document.querySelectorAll("[data-poll-form]").forEach((form) => {
          form.addEventListener("submit", () => {
            const button = form.querySelector("button[type='submit']");
            if (!button) return;

            button.disabled = true;
            button.dataset.originalLabel = button.textContent;
            button.textContent = "Polling...";

            const note = document.createElement("div");
            note.className = "busy-note";
            note.textContent = "Polling Gmail and refreshing the queue...";
            form.appendChild(note);
          });
        });

        document.querySelectorAll("[data-editor-command]").forEach((button) => {
          button.addEventListener("click", () => {
            const command = button.dataset.editorCommand;
            if (!command) return;
            document.execCommand(command, false);
          });
        });

        document.querySelectorAll("[data-draft-form]").forEach((form) => {
          form.addEventListener("submit", (event) => {
            const editor = document.querySelector("[data-draft-editor]");
            const draftInput = form.querySelector("[data-draft-input]");
            if (editor && draftInput) {
              draftInput.value = editor.innerHTML.trim();
            }

            const submitter = event.submitter;
            if (submitter && submitter.hasAttribute("data-send-button")) {
              submitter.disabled = true;
              submitter.dataset.originalLabel = submitter.textContent;
              submitter.textContent = "Sending...";

              let note = form.querySelector(".busy-note");
              if (!note) {
                note = document.createElement("div");
                note.className = "busy-note";
                form.appendChild(note);
              }
              note.textContent = "Sending test email and refreshing the queue...";
            }
          });
        });

        const updateQueueLinksForViewport = () => {
          const mobile = window.matchMedia("(max-width: 900px)").matches;
          document.querySelectorAll("[data-desktop-href][data-mobile-href]").forEach((link) => {
            link.setAttribute("href", mobile ? link.dataset.mobileHref : link.dataset.desktopHref);
          });
        };

        updateQueueLinksForViewport();
        window.addEventListener("resize", updateQueueLinksForViewport);
      });
    </script>
  </body>
</html>
